name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # triggers on v0.1.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  # ── Step 1: Run full test suite ────────────────────────────────────────────
  test:
    name: Tests (Python 3.12 / ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short

  # ── Step 2: Build wheel + sdist ────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test           # only build if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Validate wordlists before build
        run: python scripts/validate_wordlists.py

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Step 3: Publish to TestPyPI ───────────────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/profanityx
    permissions:
      id-token: write       # required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Fallback: if OIDC trusted publishing is not configured,
          # set repository secret PYPI_API_TOKEN and uncomment below:
          # password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  # ── Step 4: Publish to PyPI ───────────────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/profanityx
    permissions:
      id-token: write       # required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # Fallback: if OIDC trusted publishing is not configured, uncomment:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}

  # ── Step 5: Create GitHub Release ─────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            pip install profanityx==${{ github.ref_name }}
            ```

            See [CHANGELOG](https://github.com/bahodirov07uz/profanityx/blob/main/CHANGELOG.md) for details.
