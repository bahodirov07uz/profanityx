name: Publish to PyPI

on:
  push:
    tags:
      - "v*" # Triggers on git tags matching v*, e.g. v0.1.0, v1.0.0
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

jobs:
  # ── Step 1: Quality Check & Tests ──────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate wordlists
        run: python scripts/validate_wordlists.py

      - name: Run pytest
        run: pytest --tb=short

  # ── Step 2: Build package distributions (sdist & wheel) ────────────────────
  build:
    name: Build sdist & wheel
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build module
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/

  # ── Step 3: Publish to PyPI ────────────────────────────────────────────────
  publish:
    name: Publish package to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC Trusted Publishing

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Works out-of-the-box with PyPI Trusted Publishing (OIDC).
          # If using PYPI_API_TOKEN secret instead of OIDC, uncomment line below:
          # password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ── Step 4: Create GitHub Release ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## ProfanityX Release ${{ github.ref_name }} 🚀

            Install via pip:
            ```bash
            pip install profanityx==${{ github.ref_name }}
            ```
