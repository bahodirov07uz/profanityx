name: Validate Wordlists

on:
  pull_request:
    paths:
      - "profanityx/wordlists/*.json"
  push:
    branches: [main, dev]
    paths:
      - "profanityx/wordlists/*.json"
  workflow_dispatch:

jobs:
  validate:
    name: Validate wordlists
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run wordlist validator
        run: python scripts/validate_wordlists.py
